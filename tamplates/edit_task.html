{% extends "base.html" %}

{% block title %}Редактирование задачи - Task Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">
                    <i class="fas fa-edit me-2"></i>Редактирование задачи
                </h4>
            </div>
            <div class="card-body">
                <form action="{{ url_for('edit_task', task_id=task.id) }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Проект</label>
                        <input type="text" class="form-control" value="{{ task.project_title }}" readonly>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Описание задачи</label>
                        <textarea class="form-control" name="description" rows="3" required>{{ task.description }}</textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Исполнитель</label>
                        <select class="form-select" name="performer_id">
                            <option value="">Не назначен</option>
                            {% for performer in performers %}
                                <option value="{{ performer.id }}" 
                                    {% if performer.id == task.performer_id %}selected{% endif %}>
                                    {{ performer.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Приоритет</label>
                        <select class="form-select" name="priority" required>
                            <option value="Low" {% if task.priority == 'Low' %}selected{% endif %}>Low</option>
                            <option value="Medium" {% if task.priority == 'Medium' %}selected{% endif %}>Medium</option>
                            <option value="High" {% if task.priority == 'High' %}selected{% endif %}>High</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Текущий статус</label>
                        <input type="text" class="form-control" value="{{ task.status }}" readonly>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Дедлайн</label>
                        <input type="date" class="form-control" name="deadline" 
                               value="{{ task.deadline if task.deadline else '' }}">
                    </div>
                    
                    {% if task.finished_at %}
                    <div class="mb-3">
                        <label class="form-label">Дата завершения</label>
                        <input type="text" class="form-control" value="{{ task.finished_at }}" readonly>
                    </div>
                    {% endif %}
                    
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('index') }}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left me-1"></i>Назад
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-1"></i>Сохранить изменения
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
